services:
  - type: web
    name: golf-platform-api
    env: node
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: "file:/data/sqlite.db"
      - key: NODE_VERSION
        value: 18
      - key: CLIENT_URL
        value: "https://golf-prd-outlines-phi.vercel.app"
      - key: JWT_SECRET
        generateValue: true